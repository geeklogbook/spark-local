services:
  spark-master:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: ["/opt/spark/sbin/start-master.sh", "-h", "spark-master", "-p", "7077"]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./src:/opt/spark-apps
    networks:
      - spark-network

  spark-worker-1:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker-1
    environment:
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      - spark-master
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077", "--webui-port", "8081"]
    ports:
      - "8081:8081"
    networks:
      - spark-network

  spark-worker-2:
    image: apache/spark:4.0.2-scala2.13-java17-python3-r-ubuntu
    container_name: spark-worker-2
    environment:
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      - spark-master
    command: ["/opt/spark/sbin/start-worker.sh", "spark://spark-master:7077", "--webui-port", "8082"]
    ports:
      - "8082:8082"
    networks:
      - spark-network

  jupyter:
    build: ./jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    volumes:
      - ./notebooks:/workspace/notebooks
      - ./src:/workspace/src
    depends_on:
      - spark-master
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge